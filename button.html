       NEW SECTIONS: Testimonial tabs, video embeds, scroll animations
       ============================================================ -->
    <script>
        (function () {
            /* ---- Testimonial tabs ---- */
            const testiTabs = document.querySelectorAll('.testi-tab');
            const testiPanels = document.querySelectorAll('.testi-panel');
            testiTabs.forEach(function (tab) {
                tab.addEventListener('click', function () {
                    testiTabs.forEach(function (t) {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                    });
                    testiPanels.forEach(function (p) { p.classList.remove('active'); });
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                    const target = document.getElementById('testi-panel-' + tab.dataset.testiTab);
                    if (target) target.classList.add('active');
                });
            });

            /* ---- YouTube embed on thumbnail click ---- */
            document.querySelectorAll('.testi-video-thumb').forEach(function (thumb) {
                thumb.addEventListener('click', function () {
                    const ytUrl = thumb.dataset.yt;
                    if (!ytUrl) return;
                    const iframe = document.createElement('iframe');
                    iframe.src = ytUrl + '?autoplay=1&rel=0';
                    iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
                    iframe.allowFullscreen = true;
                    iframe.style.cssText = 'width:100%;height:100%;border:none;border-radius:inherit;position:absolute;inset:0;';
                    thumb.innerHTML = '';
                    thumb.style.position = 'relative';
                    thumb.appendChild(iframe);
                });
            });

            /* ---- Intersection Observer scroll animations ---- */
            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function setupObserver(selector, options) {
                var els = document.querySelectorAll(selector);
                if (!els.length) return;
                var obs = new IntersectionObserver(function (entries) {
                    entries.forEach(function (entry) {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('anim-in');
                            obs.unobserve(entry.target);
                        }
                    });
                }, options || { threshold: 0.15 });
                els.forEach(function (el) { obs.observe(el); });
            }

            if (!prefersReduced) {
                
                setupObserver('.testi-tabs');
                setupObserver('.testi-card');
                setupObserver('.testi-video-card');
                setupObserver('.testi-mixed-card');
                setupObserver('.testi-mixed-video');
                setupObserver('.reveal-stagger');
            } else {
                /* Reduced motion: just make everything visible */
                document.querySelectorAll('.testi-tabs,.testi-card,.testi-video-card,.testi-mixed-card,.testi-mixed-video,.reveal-stagger').forEach(function (el) {
                    el.classList.add('anim-in', 'anim-reduced');
                });
            }
        })();
    </script>
